<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Viewer</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">

  <style>
    :root {
      --border: rgba(0, 0, 0, 0.08);
      --header-h: 52px;
    }

    body { background-color: #eee; margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: sans-serif; }

    #viewerContainer {
      position: absolute;
      top: var(--header-h);
      width: 100%;
      height: calc(100% - var(--header-h));
      overflow: auto;
    }

    /* Assuming this is the trigger button class */
    .linkAnnotationArea {
        background-color: rgba(136, 191, 251, 0.3) !important; /* Semi-transparent blue */
        border: 1px solid rgba(0, 123, 255, 0.6) !important;  /* Blue border */
        visibility: visible !important;                     /* Ensure it is visible */
        cursor: pointer !important;
    }

    header {
        z-index: 10;
        display: flex;
        align-items: center;
        height: var(--header-h);
        padding: 0 16px;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        justify-content: center;
    }

    header h1 {
        margin: 0;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: #0060df;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
</head>
<body>
    <header>
        <h1>PDF Viewer</h1>
    </header>
    <div id="viewerContainer">
        <div id="viewer" class="pdfViewer"></div>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        const pdfjsViewer = window['pdfjs-dist/web/pdf_viewer'];

        const container = document.getElementById('viewerContainer');
        const eventBus = new pdfjsViewer.EventBus();

        // 1. Initialize the official PDFViewer; it automatically renders all graphics and fonts perfectly for us.
        const pdfViewer = new pdfjsViewer.PDFViewer({
            container,
            eventBus,
            renderInteractiveForms: true
        });

        const removeSuffix = (fieldName, suffix) => {
            if (!fieldName || !suffix || !fieldName.endsWith(suffix)) {
                return null;
            }
            return fieldName.slice(0, -suffix.length);
        };

        const getLayerRootEl = (layerDiv) => {
            if (!layerDiv) return null;

            // The pdf.js annotationLayer is usually an object; the real DOM is under .div
            if (layerDiv.div && typeof layerDiv.div.querySelector === 'function') {
                return layerDiv.div;
            }

            // If it's already a DOM element, use it directly
            if (typeof layerDiv.querySelector === 'function') {
                return layerDiv;
            }

            return null;
        };

        // Listen for the event: when PDF.js finishes rendering the annotation layer
        eventBus.on('annotationlayerrendered', (page) => {
            const layerDiv = page.source.annotationLayer;
            if (!layerDiv) return;

            page.source.pdfPage.getAnnotations().then(annotations => {
                const rootEl = getLayerRootEl(layerDiv);
                if (!rootEl) return;

                const popupIdByBase = {};
                const quizBaseSet = {};

                console.log(quizBaseSet);

                // Collect popup (*_popup) and quiz btn (*_btn) base names
                for (const anno of annotations) {
                    if (!anno.fieldName) continue;

                    if (anno.fieldName.endsWith('_popup')) {
                        const base = removeSuffix(anno.fieldName, '_popup');
                        if (base) popupIdByBase[base] = anno.id;
                    } else if (anno.fieldName.endsWith('_btn')) {
                        const base = removeSuffix(anno.fieldName, '_btn');
                        if (base) quizBaseSet[base] = true;
                    }
                }

                // Handle quiz popups
                const quizPopupElByBase = {};
                const quizPopupEls = [];

                // Collect popup elements for quiz bases
                Object.keys(quizBaseSet).forEach((base) => {
                    const popupId = popupIdByBase[base];
                    if (!popupId) return;

                    const popupEl = rootEl.querySelector(`[data-annotation-id="${popupId}"]`);
                    if (popupEl) {
                        quizPopupElByBase[base] = popupEl;
                        quizPopupEls.push(popupEl);

                        popupEl.style.visibility = 'hidden';
                        popupEl.style.pointerEvents = 'none';
                    }
                });

                // Handle quiz buttons
                const quizBtnEls = [];
                for (const anno of annotations) {
                    if (!anno.fieldName || !anno.fieldName.endsWith('_btn')) {
                        continue;
                    }

                    const base = removeSuffix(anno.fieldName, '_btn');
                    if (!base || !quizPopupElByBase[base]) {
                        continue;
                    }

                    const quizBtnEl = rootEl.querySelector(`[data-annotation-id="${anno.id}"]`);
                    if (!quizBtnEl) {
                        continue;
                    }

                    if (!quizBtnEl.dataset.pdfQuizBound) {
                        // set the bound key to 1 to html (true)
                        quizBtnEl.dataset.pdfQuizBound = '1';

                        quizBtnEl.style.cursor = 'pointer';
                        quizBtnEl.classList.add('linkAnnotationArea');
                        quizBtnEls.push(quizBtnEl);

                        quizBtnEl.addEventListener('click', (e) => {
                        e.preventDefault();

                        const popupEl = quizPopupElByBase[base];
                        if (!popupEl) {
                            return;
                        }

                        for (const el of quizPopupEls) {
                            el.style.visibility = 'hidden';
                        }

                        // Once selected: show only the corresponding popup; no more toggling
                        popupEl.style.visibility = 'visible';

                        // Disable all quiz btns to prevent state changes later
                        for (const el of quizBtnEls) {
                            el.style.pointerEvents = 'none';
                            el.style.cursor = 'default';
                            el.classList.remove('linkAnnotationArea');
                        }
                        });
                    }
                }

                // Bind wording (*_on / *_off) click: show/hide the corresponding *_popup for the same base
                for (const anno of annotations) {
                    if (!anno.fieldName) {
                        continue;
                    }

                    let suffix = null;
                    let shouldBeVisible = null;

                    if (anno.fieldName.endsWith('_on')) {
                        suffix = '_on';
                        shouldBeVisible = true;
                    } else if (anno.fieldName.endsWith('_off')) {
                        suffix = '_off';
                        shouldBeVisible = false;
                    }

                    if (!suffix) {
                        continue;
                    }

                    const base = removeSuffix(anno.fieldName, suffix);
                    const popupId = popupIdByBase[base];
                    if (!base || !popupId) {
                        continue;
                    }

                    const wordBtnEl = rootEl.querySelector(`[data-annotation-id="${anno.id}"]`);
                    const popupEl = rootEl.querySelector(`[data-annotation-id="${popupId}"]`);
                    if (!wordBtnEl || !popupEl) {
                        continue;
                    }

                    const boundKey = shouldBeVisible ? 'pdfWordOnBound' : 'pdfWordOffBound';
                    if (wordBtnEl.dataset[boundKey]) {
                        continue;
                    }

                    // set the bound key to 1 to html (true)
                    wordBtnEl.dataset[boundKey] = '1';

                    wordBtnEl.style.cursor = 'pointer';
                    wordBtnEl.classList.add('linkAnnotationArea');

                    wordBtnEl.addEventListener('click', (e) => {
                        e.preventDefault();

                        // If the popup is already visible, click again to close; otherwise toggle visibility
                        const currentVisibility = getComputedStyle(popupEl).visibility;
                        popupEl.style.visibility = (currentVisibility === 'visible') ? 'hidden' : 'visible';
                    });
                }
            });
        });

        // 3. Load the PDF and intercept data before handing it to the viewer
        const pdfUrl = '/pdf/document.pdf';

        pdfjsLib.getDocument(pdfUrl).promise.then(async (pdf) => {
            pdfViewer.setDocument(pdf);
        });
    </script>
</body>
</html>
